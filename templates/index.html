<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Boolean Search Engine</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --card:     #22263a;
    --border:   #2e3350;
    --accent:   #6c63ff;
    --accent2:  #a78bfa;
    --text:     #e2e8f0;
    --muted:    #94a3b8;
    --success:  #34d399;
    --danger:   #f87171;
    --warn:     #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.25rem; font-weight: 700; color: var(--accent2); }
  header span { font-size: .78rem; color: var(--muted); margin-left: 10px; }

  .toggle-row { display: flex; align-items: center; gap: 8px; font-size: .85rem; color: var(--muted); }
  .toggle { position: relative; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: var(--border);
    border-radius: 22px; cursor: pointer; transition: .25s;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; left: 3px; bottom: 3px;
    background: #fff; border-radius: 50%; transition: .25s;
  }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider::before { transform: translateX(18px); }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 0;
    overflow: hidden;
  }

  .panel {
    padding: 22px 20px;
    overflow-y: auto;
    height: calc(100vh - 57px);
  }

  .left-panel { border-right: 1px solid var(--border); }

  h2 { font-size: .95rem; font-weight: 600; color: var(--accent2); margin-bottom: 12px; }

  textarea {
    width: 100%; height: 130px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: .9rem;
    resize: vertical; outline: none;
    transition: border-color .2s;
  }
  textarea:focus { border-color: var(--accent); }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }

  button {
    padding: 8px 18px; border-radius: 7px; border: none;
    font-size: .88rem; font-weight: 600; cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .88; }
  .btn-danger  { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-search  { background: var(--accent); color: #fff; padding: 10px 22px; }
  .btn-search:hover { opacity: .88; }

  .doc-list { margin-top: 18px; }
  .doc-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 7px; padding: 9px 12px; margin-bottom: 7px;
    cursor: pointer; transition: border-color .2s;
    font-size: .83rem; color: var(--muted);
  }
  .doc-item:hover { border-color: var(--accent); }
  .doc-item strong { color: var(--text); font-size: .88rem; display: block; margin-bottom: 3px; }

  .doc-preview {
    background: var(--card); border: 1px solid var(--accent);
    border-radius: 8px; padding: 12px; margin-top: 10px;
    font-size: .85rem; color: var(--text); line-height: 1.55;
    display: none; white-space: pre-wrap;
  }

  .search-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .search-bar input {
    flex: 1; background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: .95rem; outline: none;
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: .78rem; color: var(--muted); cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent2); }

  .stats {
    display: flex; gap: 18px; margin-bottom: 16px;
    font-size: .82rem; color: var(--muted);
  }
  .stats span strong { color: var(--text); }

  .results-area { display: flex; flex-direction: column; gap: 10px; }

  .r-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 9px; padding: 14px 16px;
  }
  .r-card-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 8px;
  }
  .r-id {
    background: var(--accent); color: #fff;
    border-radius: 5px; padding: 2px 9px;
    font-size: .78rem; font-weight: 700;
  }
  .r-text { font-size: .88rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; }

  mark {
    background: #fbbf24;
    color: #0f1117;
    border-radius: 3px;
    padding: 0 2px;
    font-weight: 600;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: .95rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

  .status-bar {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 6px 24px; font-size: .78rem; color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔍 Boolean Search Engine</h1>
    <span>Information Retrieval — Proof of Concept</span>
  </div>
  <div class="toggle-row">
    Stop-word removal
    <label class="toggle">
      <input type="checkbox" id="stopToggle" checked onchange="toggleStops(this)"/>
      <span class="slider"></span>
    </label>
  </div>
</header>

<main>
  <!-- LEFT: document input -->
  <div class="panel left-panel">
    <h2>📄 Documents</h2>
    <textarea id="docInput" placeholder="Paste or type a document here…"></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="addDoc()">＋ Add Document</button>
      <button class="btn-danger"  onclick="clearAll()">🗑 Clear All</button>
    </div>
    <div class="doc-list" id="docList"></div>
    <div class="doc-preview" id="docPreview"></div>
  </div>

  <!-- RIGHT: search -->
  <div class="panel">
    <h2>🔎 Search</h2>
    <div class="search-bar">
      <input id="queryInput" type="text" placeholder='e.g. python AND (web OR api) NOT java'/>
      <button class="btn-search" onclick="doSearch()">Search</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="setQ('python AND web')">python AND web</span>
      <span class="chip" onclick="setQ('data OR machine')">data OR machine</span>
      <span class="chip" onclick="setQ('NOT java')">NOT java</span>
      <span class="chip" onclick="setQ('search AND NOT sql')">search AND NOT sql</span>
    </div>

    <div class="stats" id="statsBar">
      <span>Documents: <strong id="statDocs">0</strong></span>
      <span>Index terms: <strong id="statTerms">0</strong></span>
    </div>

    <div class="results-area" id="results">
      <div class="empty-state">
        <div class="icon">🗂️</div>
        Add documents and run a Boolean query to see results.
      </div>
    </div>
  </div>
</main>

<div class="status-bar" id="statusBar">Ready.</div>

<script>
  const docStore = {};

  // ── helpers ────────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    return r.json();
  }

  function status(msg, type = '') {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.style.color = type === 'err'  ? 'var(--danger)'  :
                     type === 'ok'   ? 'var(--success)'  :
                     type === 'warn' ? 'var(--warn)'      : 'var(--muted)';
  }

  function updateStats(total, terms) {
    document.getElementById('statDocs').textContent  = total;
    document.getElementById('statTerms').textContent = terms;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── highlight ──────────────────────────────────────────────────────────────
  function extractTerms(query) {
    return query
      .split(/\s+/)
      .map(t => t.replace(/[()]/g, '').toLowerCase())
      .filter(t => t && !['and','or','not'].includes(t));
  }

  function highlight(text, terms) {
    if (!terms.length) return esc(text);
    let safe = esc(text);
    terms.forEach(term => {
      const re = new RegExp('(?<![\\w])' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(?![\\w])', 'gi');
      safe = safe.replace(re, m => `<mark>${m}</mark>`);
    });
    return safe;
  }

  // ── document management ────────────────────────────────────────────────────
  async function loadDocs() {
    const data = await api('GET', '/api/docs');
    updateStats(data.total, data.terms);
    const list = document.getElementById('docList');
    list.innerHTML = '';
    data.docs.forEach(d => {
      docStore[d.id] = docStore[d.id] || d.preview;
      const el = document.createElement('div');
      el.className = 'doc-item';
      el.innerHTML = `<strong>Document ${d.id}</strong>${esc(d.preview)}${d.preview.length >= 80 ? '…' : ''}`;
      el.onclick = () => previewDoc(d.id, el);
      list.appendChild(el);
    });
  }

  async function addDoc() {
    const ta = document.getElementById('docInput');
    const text = ta.value.trim();
    if (!text) { status('Document is empty.', 'warn'); return; }
    const data = await api('POST', '/api/add', { text });
    if (data.error) { status(data.error, 'err'); return; }
    docStore[data.id] = text;
    ta.value = '';
    updateStats(data.total, data.terms);
    status(`Document ${data.id} added.`, 'ok');
    await loadDocs();
  }

  function previewDoc(id, el) {
    const pv = document.getElementById('docPreview');
    const full = docStore[id] || '(text not cached)';
    if (pv.dataset.open === String(id)) {
      pv.style.display = 'none';
      pv.dataset.open = '';
    } else {
      pv.textContent = full;
      pv.style.display = 'block';
      pv.dataset.open = id;
    }
  }

  async function clearAll() {
    if (!confirm('Clear all documents?')) return;
    await api('DELETE', '/api/docs');
    Object.keys(docStore).forEach(k => delete docStore[k]);
    document.getElementById('docList').innerHTML    = '';
    document.getElementById('docPreview').style.display = 'none';
    document.getElementById('results').innerHTML =
      '<div class="empty-state"><div class="icon">🗂️</div>Add documents and run a Boolean query to see results.</div>';
    updateStats(0, 0);
    status('All documents cleared.', 'warn');
  }

  // ── search ─────────────────────────────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById('queryInput').value.trim();
    if (!q) { status('Enter a query.', 'warn'); return; }
    const data = await api('POST', '/api/search', { query: q });
    const area = document.getElementById('results');

    if (data.error) {
      area.innerHTML = `<div class="empty-state" style="color:var(--danger)">⚠️ ${esc(data.error)}</div>`;
      status(data.error, 'err');
      return;
    }

    if (!data.results.length) {
      area.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>No documents matched.</div>';
      status('No results found.', 'warn');
      return;
    }

    const terms = extractTerms(q);

    area.innerHTML = data.results.map(r => `
      <div class="r-card">
        <div class="r-card-header">
          <span class="r-id">Document ${r.id}</span>
        </div>
        <div class="r-text">${highlight(r.text, terms)}</div>
      </div>
    `).join('');

    status(`${data.count} document(s) matched.`, 'ok');
  }

  // ── settings ───────────────────────────────────────────────────────────────
  async function toggleStops(cb) {
    const data = await api('PATCH', '/api/stops', { enabled: cb.checked });
    updateStats(Object.keys(docStore).length, data.terms);
    status(`Stop-word removal ${data.remove_stops ? 'enabled' : 'disabled'}.`);
  }

  function setQ(q) {
    document.getElementById('queryInput').value = q;
    doSearch();
  }

  // ── keyboard shortcuts ─────────────────────────────────────────────────────
  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
  document.getElementById('docInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) addDoc();
  });

  // ── init ───────────────────────────────────────────────────────────────────
  loadDocs();
</script>
</body>
</html>
